name: Jira Sync
on:
  issues:
    types: [opened, closed, deleted, reopened]
  pull_request_target:
    types: [opened, closed, reopened]
  issue_comment: # Also triggers when commenting on a PR from the conversation view
    types: [created]

# Reusable Jira sync only reads issue/PR metadata to mirror to Jira.
permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  sync:
    uses: hashicorp/vault-workflows-common/.github/workflows/jira.yaml@main
    secrets:
      JIRA_SYNC_BASE_URL: ${{ secrets.JIRA_SYNC_BASE_URL }}
      JIRA_SYNC_USER_EMAIL: ${{ secrets.JIRA_SYNC_USER_EMAIL }}
      JIRA_SYNC_API_TOKEN: ${{ secrets.JIRA_SYNC_API_TOKEN }}
    with:
      teams-array: '["vault-eco", "vault-eco-infra"]'
